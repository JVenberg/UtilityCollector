# Deploy Cloud Run scraper on merge to main when scraper/ changes.
#
# Authenticates as github-action-1017477113@utilitysplitter.iam.gserviceaccount.com
# via the FIREBASE_SERVICE_ACCOUNT_UTILITYSPLITTER secret.

name: Deploy scraper to Cloud Run on merge
on:
  push:
    branches:
      - main
    paths:
      - 'scraper/**'
      - '.github/workflows/deploy-scraper.yml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UTILITYSPLITTER }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy utility-scraper \
            --source scraper \
            --region us-central1 \
            --project utilitysplitter \
            --quiet
